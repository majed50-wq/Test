<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HTML Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0e8b7e; --teal2:#15b8a6; --gold:#cf9b34; --gold2:#d8b24a;
    --ink:#0c2a27; --bg:#f4f7f6; --card:#ffffff; --line:#dfeae7;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Sora',system-ui,sans-serif;color:var(--ink);
    background:radial-gradient(1200px 600px at 50% -10%,#e7f4f1,var(--bg));
    padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
    display:flex;flex-direction:column;align-items:center;
  }
  .wrap{width:100%;max-width:560px;margin:0 auto}
  header{text-align:center;padding:18px 0 12px}
  h1{font-family:'DM Serif Display',serif;font-size:30px;margin:0;color:var(--teal)}
  .sub{font-size:13px;color:#5d7a75;margin-top:4px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 8px 24px rgba(14,139,126,.07)}
  .big{
    width:100%;border:none;border-radius:16px;padding:18px;font-family:'Sora';
    font-size:18px;font-weight:700;color:#fff;cursor:pointer;
    background:linear-gradient(135deg,var(--teal),var(--teal2));
    box-shadow:0 6px 16px rgba(14,139,126,.28);
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .big:active{transform:translateY(1px)}
  .big svg{width:22px;height:22px}
  textarea{
    width:100%;min-height:200px;margin-top:12px;resize:vertical;
    border:1px solid var(--line);border-radius:14px;padding:13px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;
    line-height:1.5;color:#173a36;background:#fbfdfc;
  }
  textarea:focus{outline:none;border-color:var(--teal2);box-shadow:0 0 0 3px rgba(21,184,166,.15)}
  .row{display:flex;gap:10px;margin-top:12px;align-items:stretch}
  .name{flex:1;min-width:0;border:1px solid var(--line);border-radius:12px;padding:0 12px;font-family:'Sora';font-size:14px;color:#173a36;background:#fbfdfc}
  .name:focus{outline:none;border-color:var(--gold2)}
  .dl{
    border:none;border-radius:12px;padding:0 18px;font-family:'Sora';font-weight:700;
    font-size:15px;color:#3a2a06;cursor:pointer;white-space:nowrap;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    box-shadow:0 5px 14px rgba(207,155,52,.3);
  }
  .dl:active{transform:translateY(1px)}
  .dl:disabled{opacity:.45;box-shadow:none;cursor:default}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:#7a948f;margin-top:8px;padding:0 2px}
  .hint{font-size:12px;color:#88a09b;text-align:center;margin-top:14px;line-height:1.5}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(120px);
    background:var(--ink);color:#eafff9;padding:11px 18px;border-radius:999px;
    font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);
    opacity:0;transition:.3s;z-index:9;pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>HTML Maker</h1>
    <div class="sub">Paste code &rarr; get a .html file</div>
  </header>

  <div class="card">
    <button class="big" id="oneTap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Paste &amp; Download
    </button>

    <textarea id="code" placeholder="...or paste your HTML here"></textarea>

    <div class="row">
      <input class="name" id="fname" placeholder="page" value="page">
      <button class="dl" id="dlBtn" disabled>Download</button>
    </div>
    <div class="meta">
      <span id="size">0 chars</span>
      <span id="auto"></span>
    </div>
  </div>

  <div class="hint">One tap reads your clipboard, names the file from its &lt;title&gt;, and saves it. No clipboard access? Paste below and hit Download.</div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var code=document.getElementById('code'),
      fname=document.getElementById('fname'),
      dlBtn=document.getElementById('dlBtn'),
      oneTap=document.getElementById('oneTap'),
      sizeEl=document.getElementById('size'),
      autoEl=document.getElementById('auto'),
      toast=document.getElementById('toast'),
      userTouchedName=false;

  function flash(msg){
    toast.textContent=msg; toast.classList.add('show');
    clearTimeout(flash._t); flash._t=setTimeout(function(){toast.classList.remove('show');},1800);
  }

  function clean(s){
    s=(s||'').trim().replace(/[\/\\:*?"<>|]+/g,'-').replace(/\s+/g,'-').replace(/-+/g,'-');
    s=s.replace(/^-+|-+$/g,'');
    if(!s) s='page';
    if(!/\.html?$/i.test(s)) s+='.html';
    return s;
  }

  function titleFrom(html){
    var m=html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
    if(m && m[1].trim()){
      var t=m[1].replace(/&[a-z#0-9]+;/gi,' ').trim();
      return t;
    }
    return '';
  }

  function refresh(){
    var v=code.value;
    sizeEl.textContent=v.length.toLocaleString()+' chars';
    dlBtn.disabled=!v.trim();
    if(!userTouchedName){
      var t=titleFrom(v);
      if(t){ fname.value=t; autoEl.textContent='name from <title>'; }
      else { autoEl.textContent=''; }
    }
  }

  function download(){
    var v=code.value;
    if(!v.trim()){ flash('Nothing to save'); return; }
    var name=clean(fname.value);
    fname.value=name.replace(/\.html?$/i,'');
    var blob=new Blob([v],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=name; a.rel='noopener';
    document.body.appendChild(a);
    if(typeof a.download==='undefined'){
      window.open(url,'_blank'); // iOS fallback: open, then Share > Save
    } else {
      a.click();
    }
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },1200);
    flash('Saved: '+name);
  }

  oneTap.addEventListener('click', function(){
    if(navigator.clipboard && navigator.clipboard.readText){
      navigator.clipboard.readText().then(function(txt){
        if(!txt || !txt.trim()){ flash('Clipboard empty'); code.focus(); return; }
        code.value=txt; userTouchedName=false; refresh(); download();
      }).catch(function(){
        flash('Tap inside the box and paste'); code.focus();
      });
    } else {
      flash('Paste below, then Download'); code.focus();
    }
  });

  dlBtn.addEventListener('click', download);
  code.addEventListener('input', refresh);
  code.addEventListener('paste', function(){ userTouchedName=false; setTimeout(refresh,0); });
  fname.addEventListener('input', function(){ userTouchedName=true; autoEl.textContent=''; });

  refresh();
})();
</script>
</body>
</html>
